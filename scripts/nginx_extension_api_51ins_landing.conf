# INSclaw 落地页 + 公开下载接口 → lobster FastAPI (8000)
# 必须放在 location ^~ / { proxy_pass http://127.0.0.1:8003; } 之前生效；
# nginx 优先匹配更长的前缀（^~ /landing/ > ^~ /），所以这里只要 include 进 server block 即可。
    location ^~ /landing/ {
      proxy_pass http://127.0.0.1:8000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_connect_timeout 60s;
      proxy_send_timeout 600s;
      proxy_read_timeout 600s;
      # 安装包可能 ≈ 1GB，关掉缓冲让 FileResponse 直接 stream 给客户端
      proxy_buffering off;
      proxy_cache off;
      # 安装包大文件下载：放开 client_max_body_size 不需要（这是上传方向限制）
    }

    # 根路径精确匹配 → 让 FastAPI 返回 RedirectResponse(/landing/)
    location = / {
      proxy_pass http://127.0.0.1:8000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
